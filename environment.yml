name: face-recognition
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip

  # Computer Vision
  - opencv>=4.7.0

  # Data & Scientific Computing
  - numpy>=1.23.0
  - scikit-learn>=1.2.0

  # Visualization
  - matplotlib>=3.6.0
  - seaborn>=0.12.0

  # Jupyter Notebook
  - jupyter>=1.0.0
  - ipykernel>=6.0.0

  - pip:
      # TensorFlow (installed via pip — conda version lags behind)
      - tensorflow>=2.12.0

      # WebSocket server (real-time inference)
      - websockets>=11.0

      # Async utilities
      - nest-asyncio>=1.5.6
